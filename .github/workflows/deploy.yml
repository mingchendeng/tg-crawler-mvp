name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.venv' --exclude='venv' --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env*' --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r
          path: .
          remote_path: /opt/tg-crawler
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ${{ secrets.EC2_USER }}
          remote_key: ${{ secrets.EC2_SSH_KEY }}

      - name: Verify deploy script exists & is executable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euxo pipefail
            # Create .env on remote from GitHub Secrets (avoid keeping secrets in repo)
            cat > /tmp/.env.deploy <<'ENVEOF'
DATABASE_URL=${{ secrets.DATABASE_URL }}
S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
ENVEOF
            sudo mv /tmp/.env.deploy /opt/tg-crawler/.env
            sudo chown ubuntu:ubuntu /opt/tg-crawler/.env
            sudo chmod 600 /opt/tg-crawler/.env
            # Prefer top-level deploy.sh, but fall back to scripts/deploy.sh (rsync may place it there).
            if [ -f /opt/tg-crawler/deploy.sh ]; then
              DEPLOY_PATH=/opt/tg-crawler/deploy.sh
            elif [ -f /opt/tg-crawler/scripts/deploy.sh ]; then
              echo "Found /opt/tg-crawler/scripts/deploy.sh - copying to /opt/tg-crawler/deploy.sh"
              cp -f /opt/tg-crawler/scripts/deploy.sh /opt/tg-crawler/deploy.sh || sudo cp -f /opt/tg-crawler/scripts/deploy.sh /opt/tg-crawler/deploy.sh
              DEPLOY_PATH=/opt/tg-crawler/deploy.sh
            else
              echo "deploy_missing"
              ls -la /opt/tg-crawler || true
              exit 1
            fi

            if [ ! -x "$DEPLOY_PATH" ]; then
              echo "deploy_not_executable - attempting to chmod +x $DEPLOY_PATH"
              chmod +x "$DEPLOY_PATH" || sudo chmod +x "$DEPLOY_PATH" || true
            fi

            echo "deploy_present $DEPLOY_PATH"

      - name: Run deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -xuo pipefail
            bash -x /opt/tg-crawler/deploy.sh

      - name: Fetch deploy logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euxo pipefail
            mkdir -p /tmp/deploy_logs
            ls -la /opt/tg-crawler/deploy_logs || true
            tail -n +1 /opt/tg-crawler/deploy_logs/latest.log > /tmp/deploy_logs/latest.log || true
            # copy the log back to the runner workspace so upload-artifact can pick it up
            cat /tmp/deploy_logs/latest.log
            # print a marker for easier parsing
            echo "---END-OF-REMOTE-LOG---"
        env: {}

      - name: Write SSH key for runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Fetch remote deploy_logs via scp
        run: |
          mkdir -p deploy_logs
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/tg-crawler/deploy_logs ./ || true

      - name: Upload deploy logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: deploy_logs/
