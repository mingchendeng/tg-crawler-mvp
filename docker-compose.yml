services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_USER: tguser
      POSTGRES_PASSWORD: tgpwd
      POSTGRES_DB: tg_crawler
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # 固定本机 5433 → 容器 5432，避免与本机常见 Postgres(5432) 冲突；要改端口只改这一行
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tguser"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # AWS Public ECR（Bitnami）；避免 Docker Hub / quay.io 拉取失败
    image: public.ecr.aws/bitnami/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/bitnami/minio/data
    ports:
      - "9000:9000"
      - "9001:9001"

  crawler:
    build: ./crawler
    environment:
      DATABASE_URL: postgresql://tguser:tgpwd@postgres:5432/tg_crawler
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: tg-crawler-media-ffe95227
      S3_REGION: ${S3_REGION:-ap-east-1}
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_PHONE: ${TG_PHONE}
      TG_PROXY_TYPE: ${TG_PROXY_TYPE:-}
      TG_PROXY_HOST: ${TG_PROXY_HOST:-}
      TG_PROXY_PORT: ${TG_PROXY_PORT:-0}
      TG_PROXY_USERNAME: ${TG_PROXY_USERNAME:-}
      TG_PROXY_PASSWORD: ${TG_PROXY_PASSWORD:-}
      TARGET_CHANNELS: ${TARGET_CHANNELS:-haijiaoxuanfei}
      DEDUP_LLM_ENABLED: ${DEDUP_LLM_ENABLED:-false}
      DEDUP_LLM_API_URL: ${DEDUP_LLM_API_URL:-https://api.deepseek.com/v1/chat/completions}
      DEDUP_LLM_API_KEY: ${DEDUP_LLM_API_KEY:-}
      DEDUP_LLM_MODEL: ${DEDUP_LLM_MODEL:-deepseek-chat}
      DEDUP_LLM_TIMEOUT_SEC: ${DEDUP_LLM_TIMEOUT_SEC:-60}
      DEDUP_CANDIDATE_LIMIT: ${DEDUP_CANDIDATE_LIMIT:-40}
    volumes:
      - ./crawler:/app
      - tg_session:/app/session
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: python main.py

  web:
    build: ./web
    environment:
      DATABASE_URL: postgresql://tguser:tgpwd@postgres:5432/tg_crawler
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: tg-crawler-media-ffe95227
      S3_REGION: ${S3_REGION:-ap-east-1}
      ADMIN_SECRET: change-me-in-production
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio

volumes:
  pg_data:
  minio_data:
  tg_session:
