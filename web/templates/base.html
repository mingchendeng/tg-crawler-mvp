<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TG Crawler Admin{% endblock %}</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --sidebar-width: 220px;
            --primary-gradient: linear-gradient(135deg, #1e2a4a 0%, #2d3b6e 100%);
            --accent: #4f7cff;
            --accent-light: #e8edff;
            --bg-body: #f0f2f5;
            --card-shadow: 0 1px 4px rgba(0,0,0,0.06);
            --radius: 10px;
        }
        body { background-color: var(--bg-body); font-size: .9rem; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
            background: var(--primary-gradient); z-index: 100;
            display: flex; flex-direction: column;
        }
        .sidebar .brand {
            padding: 18px 16px; font-size: 1rem; font-weight: 700;
            color: #fff; border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: rgba(255,255,255,.7); text-decoration: none;
            transition: all .15s; font-size: .88rem;
        }
        .sidebar .nav-item:hover, .sidebar .nav-item.active {
            background: rgba(255,255,255,.1); color: #fff;
        }
        .sidebar .nav-item.active { border-right: 3px solid var(--accent); }
        .sidebar .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
        .sidebar .user-info {
            margin-top: auto; padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.8); font-size: .82rem;
        }
        .sidebar .user-info .role-badge {
            display: inline-block; padding: 1px 8px; border-radius: 20px;
            font-size: .7rem; font-weight: 600; text-transform: uppercase;
            background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
            margin-left: 4px;
        }
        .main-content { margin-left: var(--sidebar-width); padding: 20px 24px; min-height: 100vh; }
        .card { border: none; box-shadow: var(--card-shadow); border-radius: var(--radius); }
        .card-header {
            background: transparent; border-bottom: 1px solid #eee;
            font-weight: 600; padding: 14px 18px;
        }
        .table > :not(caption) > * > * { padding: 10px 12px; vertical-align: middle; }
        .table-hover tbody tr:hover { background-color: var(--accent-light); }
        .navbar-page-title {
            font-size: 1.15rem; font-weight: 600; color: #1a1a2e;
            margin-bottom: 16px;
        }
        .badge-confidence-high { background: #28a745; }
        .badge-confidence-mid { background: #ffc107; color: #000; }
        .badge-confidence-low { background: #dc3545; }
        .media-thumb { object-fit: cover; height: 200px; width: 100%; border-radius: 8px; cursor: pointer; transition: transform .2s; }
        .media-thumb:hover { transform: scale(1.02); }
        .sticky-review { position: sticky; top: 20px; }
        .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; }
        .toast { min-width: 280px; }
        .btn-sm { font-size: .82rem; }
        .form-control-sm, .form-select-sm { font-size: .82rem; }
        .modal-header { border-bottom: 1px solid #eee; }
        .modal-footer { border-top: 1px solid #eee; }

        /* Media preview modal */
        #mediaModal .modal-content { background:#000; border:0; border-radius:0; }
        #mediaModal .btn-close { filter:invert(1); opacity:.7; }
        #mediaModal .btn-close:hover { opacity:1; }
        .media-play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.15);
            cursor: pointer; border-radius: 8px;
        }
        .media-play-overlay::after {
            content: '▶';
            font-size: 3rem; color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            opacity: .85;
            line-height: 1;
        }
        .media-play-overlay:hover::after { opacity: 1; }

        @media (max-width: 768px) {
            .sidebar { width: 56px; }
            .sidebar .brand span, .sidebar .nav-item span, .sidebar .user-info { display: none; }
            .main-content { margin-left: 56px; padding: 12px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

{% if user %}
<nav class="sidebar">
    <div class="brand">
        <i class="bi bi-shield-check"></i>
        <span>TG Crawler</span>
    </div>

    <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
        <i class="bi bi-chat-dots"></i><span>消息</span>
    </a>
    <a href="/persons" class="nav-item {% if request.url.path == '/persons' %}active{% endif %}">
        <i class="bi bi-people"></i><span>人物检索</span>
    </a>
    <a href="/crawl-logs" class="nav-item {% if request.url.path == '/crawl-logs' %}active{% endif %}">
        <i class="bi bi-journal-text"></i><span>采集日志</span>
    </a>
    <a href="/audit" class="nav-item {% if request.url.path == '/audit' %}active{% endif %}">
        <i class="bi bi-clipboard-check"></i><span>审计日志</span>
    </a>
    <a href="/settings" class="nav-item {% if request.url.path == '/settings' %}active{% endif %}">
        <i class="bi bi-gear"></i><span>采集配置</span>
    </a>
    {% if user.role == 'admin' %}
    <div style="border-top:1px solid rgba(255,255,255,.06); margin:8px 12px;"></div>
    <a href="/ops" class="nav-item {% if request.url.path == '/ops' %}active{% endif %}">
        <i class="bi bi-server"></i><span>系统控制</span>
    </a>
    <a href="/monitor" class="nav-item {% if request.url.path == '/monitor' %}active{% endif %}">
        <i class="bi bi-activity"></i><span>监控</span>
    </a>
    <a href="/users" class="nav-item {% if request.url.path == '/users' %}active{% endif %}">
        <i class="bi bi-person-badge"></i><span>用户管理</span>
    </a>
    {% endif %}

    <div class="user-info">
        <div style="display:flex;align-items:center;gap:8px;">
            <i class="bi bi-person-circle"></i>
            <span>{{ user.username }} <span class="role-badge">{{ user.role }}</span></span>
        </div>
        <div style="margin-top:6px;display:flex;gap:10px;">
            <a href="/account" class="nav-item" style="padding:4px 0;color:rgba(255,255,255,.6);font-size:.78rem;display:inline;">
                <i class="bi bi-person-gear"></i> 账户
            </a>
            <a href="/logout" class="nav-item" style="padding:4px 0;color:rgba(255,255,255,.6);font-size:.78rem;display:inline;">
                <i class="bi bi-box-arrow-right"></i> 退出
            </a>
        </div>
    </div>
</nav>
<div class="main-content">
{% else %}
<div class="main-content" style="margin-left:0;display:flex;align-items:center;justify-content:center;min-height:100vh;">
{% endif %}
    {% block content %}{% endblock %}
</div>

<!-- Media Preview Modal -->
<div class="modal fade" id="mediaModal" tabindex="-1" data-bs-keyboard="false">
  <div class="modal-dialog modal-fullscreen modal-dialog-centered">
    <div class="modal-content bg-black">
      <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index:10;opacity:.8"></button>
      <button id="modalPrevBtn" class="btn btn-dark bg-dark bg-opacity-50 border-0 position-absolute top-50 start-0 ms-2 translate-middle-y" onclick="prevMedia()" style="z-index:10;font-size:2rem;line-height:1;display:none">‹</button>
      <button id="modalNextBtn" class="btn btn-dark bg-dark bg-opacity-50 border-0 position-absolute top-50 end-0 me-2 translate-middle-y" onclick="nextMedia()" style="z-index:10;font-size:2rem;line-height:1;display:none">›</button>
      <div class="modal-body d-flex align-items-center justify-content-center p-0">
        <video id="modalVideo" controls style="max-width:100%;max-height:90vh;display:none;"></video>
        <img id="modalImage" style="max-width:100%;max-height:90vh;display:none;">
      </div>
      <div class="position-absolute bottom-0 w-100 text-white text-center pb-3" style="background:linear-gradient(transparent,rgba(0,0,0,.7));z-index:10;">
        <span id="modalMediaInfo" class="small"></span>
      </div>
    </div>
  </div>
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
<script>
function showToast(message, type) {
    type = type || 'success';
    const icon = type === 'success' ? 'bi-check-circle-fill' : type === 'danger' ? 'bi-x-circle-fill' : 'bi-info-circle-fill';
    const el = document.createElement('div');
    el.className = 'toast align-items-center text-bg-' + type + ' border-0 show';
    el.role = 'alert';
    el.innerHTML = '<div class="d-flex"><div class="toast-body"><i class="bi ' + icon + ' me-2"></i>' + message + '</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>';
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { el.remove(); }, 3500);
}
function showLoading(btn) {
    if (!btn) return;
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>处理中...';
}
function hideLoading(btn, text) {
    if (!btn) return;
    btn.disabled = false; btn.innerHTML = text || btn.dataset.origText || '确定';
}

/* Media preview modal */
let _mediaItems = [];
let _mediaIndex = 0;
let _mediaModalInstance = null;

function openMediaPreview(items, index) {
    _mediaItems = items;
    _mediaIndex = index;
    _mediaModalInstance = new bootstrap.Modal(document.getElementById('mediaModal'));
    _mediaModalInstance.show();
    renderMedia();
    document.getElementById('mediaModal').addEventListener('hidden.bs.modal', function _cleanup() {
        stopMedia();
        this.removeEventListener('hidden.bs.modal', _cleanup);
    });
}

function renderMedia() {
    const item = _mediaItems[_mediaIndex];
    if (!item) return;
    const video = document.getElementById('modalVideo');
    const img = document.getElementById('modalImage');
    video.style.display = 'none'; video.pause(); video.src = '';
    img.style.display = 'none'; img.src = '';

    if (item.media_type === 'video') {
        video.src = item.s3_url;
        video.style.display = 'block';
        video.play().catch(function() {});
    } else {
        img.src = item.thumb_url || item.s3_url;
        img.style.display = 'block';
    }

    document.getElementById('modalPrevBtn').style.display = _mediaIndex > 0 ? '' : 'none';
    document.getElementById('modalNextBtn').style.display = _mediaIndex < _mediaItems.length - 1 ? '' : 'none';
    var info = (_mediaIndex + 1) + '/' + _mediaItems.length + ' \u00b7 ' + item.media_type;
    if (item.file_size) info += ' \u00b7 ' + (item.file_size / 1048576).toFixed(1) + 'MB';
    if (item.width) info += ' \u00b7 ' + item.width + '\u00d7' + item.height;
    document.getElementById('modalMediaInfo').textContent = info;
}

function prevMedia() { if (_mediaIndex > 0) { _mediaIndex--; renderMedia(); } }
function nextMedia() { if (_mediaIndex < _mediaItems.length - 1) { _mediaIndex++; renderMedia(); } }
function stopMedia() { const v = document.getElementById('modalVideo'); v.pause(); v.src = ''; }

document.addEventListener('keydown', function(e) {
    var modal = document.getElementById('mediaModal');
    if (!modal.classList.contains('show')) return;
    if (e.key === 'ArrowLeft') { prevMedia(); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { nextMedia(); e.preventDefault(); }
    else if (e.key === 'Escape') { if (_mediaModalInstance) _mediaModalInstance.hide(); }
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
