{% extends "base.html" %}
{% block title %}系统控制 - TG Crawler{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
        <h5 class="mb-1">本地系统控制台</h5>
        <div class="small text-muted">一键启动代理 → Crawler 采集链路。</div>
    </div>
    <div class="d-flex gap-2 align-items-center">
        <span id="autoRefreshIndicator" class="small text-muted" style="display:none">自动刷新中...</span>
        <button class="btn btn-sm btn-primary" onclick="startAllServices()">一键启动采集链路</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="refreshStatus()" id="refreshBtn">刷新状态</button>
    </div>
</div>

<div class="row g-3">
    <div class="col-12 col-md-6 col-xl-3">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-bold">数据库</div>
                    <span id="dbBadge" class="badge"></span>
                </div>
                <div class="small text-muted" id="dbText">-</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-xl-3">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-bold">Web</div>
                    <span id="webBadge" class="badge"></span>
                </div>
                <div class="small text-muted" id="webText">-</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-xl-3">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-bold">代理 (Proxy)</div>
                    <span id="proxyBadge" class="badge"></span>
                </div>
                <div class="small text-muted mb-2" id="proxyText">-</div>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-sm btn-outline-success" onclick="startService('proxy')">启动</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-xl-3">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-bold">Crawler</div>
                    <span id="crawlerBadge" class="badge"></span>
                </div>
                <div class="small text-muted mb-2" id="crawlerText">-</div>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-sm btn-outline-success" onclick="startService('crawler')">启动</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="stopService('crawler')">停止</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card mt-3">
    <div class="card-body">
        <div class="fw-bold mb-2">链路就绪状态</div>
        <div id="pipelineBadgeLine" class="small mb-1"></div>
        <div id="pipelineBreakdown" class="small text-muted"></div>
        <div id="warningText" class="small text-warning mt-2"></div>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2 py-2">
        <div class="d-flex align-items-center gap-2">
            <span class="fw-bold small">实时日志</span>
            <ul class="nav nav-pills nav-sm" id="logTabs" role="tablist" style="gap:2px">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active py-0 px-2 small" id="tab-crawler" data-bs-toggle="tab" data-bs-target="#logCrawler" type="button" role="tab">Crawler</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link py-0 px-2 small" id="tab-proxy" data-bs-toggle="tab" data-bs-target="#logProxy" type="button" role="tab">Proxy</button>
                </li>
            </ul>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span id="logConnStatus" class="small text-success">● 已连接</span>
            <div class="form-check form-switch d-inline-block m-0">
                <input class="form-check-input" type="checkbox" id="logAutoScroll" checked>
                <label class="form-check-label small" for="logAutoScroll">自动滚动</label>
            </div>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="clearLogs()" title="清空">清空</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="copyLogs()" title="复制全部">复制</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="scrollLogToBottom()" title="滚动到底部">↓</button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="tab-content">
            <div class="tab-pane active" id="logCrawler" role="tabpanel">
                <pre id="logPreCrawler" class="log-pre">等待日志...</pre>
            </div>
            <div class="tab-pane" id="logProxy" role="tabpanel">
                <pre id="logPreProxy" class="log-pre">等待日志...</pre>
            </div>
        </div>
    </div>
</div>

<div class="card mt-3">
    <div class="card-body">
        <div class="fw-bold mb-2">操作结果</div>
        <pre id="actionResult" class="small mb-0" style="white-space:pre-wrap;max-height:200px;overflow:auto;">等待操作...</pre>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentStatus = {{ runtime_status | tojson }};
let autoRefreshTimer = null;
let logSources = {};
let logBuffers = {crawler: '', proxy: ''};
let currentLogTab = 'crawler';

function setBadge(el, ok) {
    el.className = 'badge ' + (ok ? 'bg-success' : 'bg-secondary');
    el.textContent = ok ? '运行中' : '未运行';
}

function setBoolBadge(el, ok) {
    el.className = 'badge ' + (ok ? 'bg-success' : 'bg-danger');
    el.textContent = ok ? '正常' : '异常';
}

function renderStatus(status) {
    currentStatus = status;
    const dbOk = !!status.database.reachable;
    setBoolBadge(document.getElementById('dbBadge'), dbOk);
    document.getElementById('dbText').textContent = dbOk ? 'PostgreSQL 连接正常' : 'PostgreSQL 不可达';

    const web = status.services.web;
    setBadge(document.getElementById('webBadge'), !!web.running);
    document.getElementById('webText').textContent = web.running ? `PID: ${(web.pids || []).join(', ')}` : '未检测到 Web 进程';

    const proxy = status.services.proxy;
    setBadge(document.getElementById('proxyBadge'), !!proxy.running);
    document.getElementById('proxyText').textContent = proxy.running ? `${proxy.host}:${proxy.port} 可连接` : `${proxy.host}:${proxy.port} 未检测到`;

    const crawler = status.services.crawler;
    setBadge(document.getElementById('crawlerBadge'), !!crawler.running);
    document.getElementById('crawlerText').textContent = crawler.running ? `PID: ${(crawler.pids || []).join(', ')}` : '未检测到 Crawler 进程';

    const pipelineReady = !!status.ready.crawler_pipeline;
    document.getElementById('pipelineBadgeLine').innerHTML = pipelineReady
        ? '<span class="badge bg-success">采集链路已就绪</span>'
        : '<span class="badge bg-warning text-dark">采集链路未就绪</span>';

    // Detailed breakdown
    const parts = [];
    parts.push(dbOk ? '✓ DB 正常' : '✗ DB 异常');
    parts.push(proxy.running ? '✓ 代理运行中' : '✗ 代理未运行');
    parts.push(crawler.running ? '✓ Crawler 运行中' : '✗ Crawler 未运行');
    document.getElementById('pipelineBreakdown').textContent = parts.join(' | ');

    const warning = (status.warnings && status.warnings.process_probe) ? String(status.warnings.process_probe) : '';
    document.getElementById('warningText').textContent = warning ? `进程探测提示: ${warning}` : '';
}

function showResult(payload) {
    document.getElementById('actionResult').textContent = JSON.stringify(payload, null, 2);
}

function refreshButtonLoading(loading) {
    const btn = document.getElementById('refreshBtn');
    if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 刷新中';
    } else {
        btn.disabled = false;
        btn.textContent = '刷新状态';
    }
}

async function refreshStatus() {
    refreshButtonLoading(true);
    try {
        const resp = await fetch('/api/system/status');
        const payload = await resp.json();
        if (!resp.ok || !payload.ok) {
            showResult(payload);
            return;
        }
        renderStatus(payload.status);
    } catch (e) {
        showResult({ok: false, message: '请求失败: ' + e.message});
    } finally {
        refreshButtonLoading(false);
    }
}

async function postAndRefresh(url) {
    try {
        const resp = await fetch(url, {method: 'POST'});
        const payload = await resp.json();
        showResult(payload);
        if (payload && payload.status) {
            renderStatus(payload.status);
        } else {
            await refreshStatus();
        }
    } catch (e) {
        showResult({ok: false, message: '请求失败: ' + e.message});
    }
}

async function startAllServices() {
    await postAndRefresh('/api/system/start-all');
}

async function startService(service) {
    await postAndRefresh(`/api/system/${service}/start`);
}

async function stopService(service) {
    if (!confirm(`确定停止 ${service} 服务？`)) return;
    await postAndRefresh(`/api/system/${service}/stop`);
}

// ---------- Auto-refresh status ----------
function startAutoRefresh() {
    stopAutoRefresh();
    autoRefreshTimer = setInterval(async () => {
        try {
            const resp = await fetch('/api/system/status');
            const payload = await resp.json();
            if (resp.ok && payload.ok) {
                renderStatus(payload.status);
            }
        } catch (_) {}
    }, 5000);
    document.getElementById('autoRefreshIndicator').style.display = 'inline';
}

function stopAutoRefresh() {
    if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
    document.getElementById('autoRefreshIndicator').style.display = 'none';
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        stopAutoRefresh();
    } else {
        startAutoRefresh();
    }
});

// ---------- Real-time logs (SSE) ----------
function connectLogStream(service) {
    if (logSources[service]) {
        logSources[service].close();
    }
    const pre = document.getElementById('logPre' + service.charAt(0).toUpperCase() + service.slice(1));
    const status = document.getElementById('logConnStatus');
    status.textContent = '● 连接中...';
    status.className = 'small text-warning';

    const es = new EventSource(`/api/system/logs/${service}/stream`);
    logSources[service] = es;

    es.addEventListener('message', (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.type === 'init') {
                logBuffers[service] = data.content;
            } else if (data.type === 'delta') {
                logBuffers[service] += data.content;
                // Keep buffer manageable (~5000 lines)
                const lines = logBuffers[service].split('\n');
                if (lines.length > 5000) {
                    logBuffers[service] = lines.slice(-5000).join('\n');
                }
            }
            pre.textContent = logBuffers[service] || '(空)';
            if (document.getElementById('logAutoScroll').checked) {
                pre.scrollTop = pre.scrollHeight;
            }
            status.textContent = '● 已连接';
            status.className = 'small text-success';
        } catch (e) {
            // ignore parse errors
        }
    });

    es.addEventListener('error', () => {
        status.textContent = '● 连接断开';
        status.className = 'small text-danger';
        // Auto-reconnect after 3s
        setTimeout(() => {
            if (document.visibilityState !== 'hidden') {
                connectLogStream(service);
            }
        }, 3000);
    });
}

function clearLogs() {
    const service = currentLogTab;
    logBuffers[service] = '';
    const pre = document.getElementById('logPre' + service.charAt(0).toUpperCase() + service.slice(1));
    if (pre) pre.textContent = '(已清空)';
}

function copyLogs() {
    const service = currentLogTab;
    const text = logBuffers[service];
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
        showToast('日志已复制到剪贴板', 'success');
    }).catch(() => {
        // Fallback
        const pre = document.getElementById('logPre' + service.charAt(0).toUpperCase() + service.slice(1));
        if (pre) {
            const range = document.createRange();
            range.selectNode(pre);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast('日志已复制到剪贴板', 'success');
        }
    });
}

function scrollLogToBottom() {
    const service = currentLogTab;
    const pre = document.getElementById('logPre' + service.charAt(0).toUpperCase() + service.slice(1));
    if (pre) pre.scrollTop = pre.scrollHeight;
}

// Tab switching
document.querySelectorAll('#logTabs button').forEach(btn => {
    btn.addEventListener('shown.bs.tab', (e) => {
        const newTab = e.target.id.replace('tab-', '');
        currentLogTab = newTab;
        connectLogStream(newTab);
    });
});

// Init
renderStatus(currentStatus);
startAutoRefresh();
connectLogStream('crawler');
</script>
<style>
.log-pre {
    height: 360px;
    overflow: auto;
    margin: 0;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    background: #1e1e1e;
    color: #d4d4d4;
    border-radius: 0 0 var(--bs-card-border-radius, 0.375rem) var(--bs-card-border-radius, 0.375rem);
    white-space: pre-wrap;
    word-break: break-all;
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Menlo, Consolas, monospace;
}
.nav-pills.nav-sm .nav-link {
    font-size: 0.8rem;
    padding: 2px 10px;
    border-radius: 12px;
}
.nav-pills.nav-sm .nav-link.active {
    background-color: var(--bs-primary);
    color: #fff;
}
.form-switch {
    padding-left: 2.2em;
}
.form-switch .form-check-input {
    width: 1.8em;
    height: 0.9em;
    margin-left: -2.2em;
}
</style>
{% endblock %}
